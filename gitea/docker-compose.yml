version: "2"

services:
  server:
    image: docker.gitea.com/gitea:1.24.6-rootless
    restart: always
    volumes:
      - ./data:/var/lib/gitea
      - ./config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:2222"
    networks:
      - gitea-net

networks:
  gitea-net:
    driver: bridge
